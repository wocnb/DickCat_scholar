<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辑巴猫减伤喵</title>

    <!-- 样式文件 -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>辑巴猫减伤喵</h1>
        <p class="subtitle">不看就关注永雏塔菲喵</p>

        <!-- 配置选择器 -->
        <div class="config-selector-container">
            <label class="config-selector-label" for="configSelector">选择配置喵:</label>
            <select id="configSelector" class="config-selector" onchange="configHandler.onConfigChange(this.value)">
                <option value="">-- 请选择配置喵 --</option>
                <!-- 配置选项将自动生成 -->
            </select>
            <div id="configStatus" class="config-info">
                <span class="config-info-icon">i</span>
                <span id="configStatusText">选择配置以加载数据</span>
            </div>
        </div>

        <div class="button-container">
            <button class="btn btn-primary" onclick="jobSelector.open()">⚔️ 职业选择喵</button>
            <button class="btn btn-primary" onclick="dataHandler.addRow()">添加行喵</button>
            <button class="btn btn-secondary" onclick="exportManager.exportData()">导出数据喵</button>
            <button class="btn btn-danger" onclick="dataHandler.clearAll()">清空表格喵</button>
        </div>

        <table id="dataTable">
            <thead>
                <tr>
                    <th style="width: 12%;">时间喵</th>
                    <th style="width: 18%;">技能名字喵</th>
                    <th style="width: 12%;">技能伤害喵</th>
                    <th style="width: 15%;">乘法减伤喵</th>
                    <th style="width: 15%;">减法减伤喵</th>
                    <th style="width: 15%;">剩余伤害喵</th>
                    <th style="width: 5%;">操作喵</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- 动态生成的行将插入这里 -->
            </tbody>
        </table>
    </div>

    <!-- JavaScript 技能常量配置 -->
    <script src="js/config/jobConstants.js"></script>
    <script src="js/config/skillConstants.js"></script>

    <!-- JavaScript 配置索引（自动加载所有配置） -->
    <script src="dungeons/index.js"></script>

    <!-- JavaScript 模块文件 -->
    <script src="js/modules/configLoader.js"></script>
    <script src="js/modules/dataManager.js"></script>
    <script src="js/modules/validator.js"></script>
    <script src="js/modules/calculator.js"></script>
    <script src="js/modules/uiRenderer.js"></script>
    <script src="js/modules/interactionHandler.js"></script>
    <script src="js/modules/dataHandler.js"></script>
    <script src="js/modules/exportManager.js"></script>
    <script src="js/modules/configHandler.js"></script>
    <script src="js/modules/skillsConfigManager.js"></script>
    <script src="js/modules/jobSelector.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
